<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theological Matrix Explorer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #ecf0f1;
            border-radius: 8px;
        }
        select, button {
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background-color: #2c3e50;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h1>Theological Matrix Explorer</h1>
    
    <div class="controls">
        <div>
            <label for="viewMode"><strong>View Mode:</strong></label>
            <select id="viewMode" onchange="updateContextDropdown()">
                <option value="system">Slice by System (Worldview)</option>
                <option value="event">Slice by Event (Debate)</option>
                <option value="agent">Slice by Agent (Anthropology)</option>
            </select>
        </div>
        <div>
            <label for="contextSelect"><strong>Select Context:</strong></label>
            <select id="contextSelect" onchange="renderTable()"></select>
        </div>
    </div>

    <div id="tableContainer"></div>
</div>

<script>
    const systems = ["Pelagianism", "Semi-Pelagianism", "Arminianism", "Reformed", "Neo-Orthodoxy", "Theology of Hope"];
    const agents = ["Adam (Pre-Fall)", "Jesus Christ", "Unregenerate Man", "Regenerate Man"];
    const events = ["The Fall", "The Cross", "Conversion", "Outward Deeds", "Heart Motive"];

    let theologicalData = {};

    // FETCH THE DATA FROM THE JSON FILE
    fetch('data.json')
        .then(response => {
            if (!response.ok) {
                throw new Error("Network response was not ok. Ensure data.json is in the same folder.");
            }
            return response.json();
        })
        .then(data => {
            theologicalData = data;
            // Only initialize the dropdowns and table AFTER data is loaded
            updateContextDropdown(); 
        })
        .catch(error => {
            document.getElementById('tableContainer').innerHTML = `<p style="color:red; text-align:center;">Error loading data: ${error.message}</p>`;
            console.error('Error fetching data:', error);
        });

    function updateContextDropdown() {
        const mode = document.getElementById('viewMode').value;
        const contextSelect = document.getElementById('contextSelect');
        contextSelect.innerHTML = ''; // Clear options

        let options = [];
        if (mode === 'system') options = systems;
        else if (mode === 'event') options = events;
        else if (mode === 'agent') options = agents;

        options.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt;
            el.textContent = opt;
            contextSelect.appendChild(el);
        });
        
        renderTable();
    }

    function renderTable() {
        // Prevent rendering if data hasn't loaded yet
        if (Object.keys(theologicalData).length === 0) return; 

        const mode = document.getElementById('viewMode').value;
        const context = document.getElementById('contextSelect').value;
        const container = document.getElementById('tableContainer');
        
        let html = '<table><thead><tr><th></th>';

        if (mode === 'system') {
            events.forEach(e => html += `<th>${e}</th>`);
            html += '</tr></thead><tbody>';
            agents.forEach(agent => {
                html += `<tr><td><strong>${agent}</strong></td>`;
                events.forEach(event => {
                    const cellData = theologicalData[context]?.[agent]?.[event] || "No data.";
                    html += `<td>${cellData}</td>`;
                });
                html += '</tr>';
            });
        } 
        else if (mode === 'event') {
            systems.forEach(s => html += `<th>${s}</th>`);
            html += '</tr></thead><tbody>';
            agents.forEach(agent => {
                html += `<tr><td><strong>${agent}</strong></td>`;
                systems.forEach(system => {
                    const cellData = theologicalData[system]?.[agent]?.[context] || "No data.";
                    html += `<td>${cellData}</td>`;
                });
                html += '</tr>';
            });
        }
        else if (mode === 'agent') {
            events.forEach(e => html += `<th>${e}</th>`);
            html += '</tr></thead><tbody>';
            systems.forEach(system => {
                html += `<tr><td><strong>${system}</strong></td>`;
                events.forEach(event => {
                    const cellData = theologicalData[system]?.[context]?.[event] || "No data.";
                    html += `<td>${cellData}</td>`;
                });
                html += '</tr>';
            });
        }

        html += '</tbody></table>';
        container.innerHTML = html;
    }
</script>

</body>
</html>
